<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bukivedenie: Results Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    #left { float:left; width:40%; }
    #right { margin-left:42%; }
    textarea { width:100%; height:400px; }
    select, button { width:100%; padding:8px; margin:8px 0; }
    pre { white-space: pre-wrap; background:#f7f7f7; padding:8px; border:1px solid #ddd; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:6px; border:1px solid #ccc; }

    /* File menu styles (under "Файлы (быстрый доступ)") */
    #fileMenuList { overflow-y:auto; max-height:640px; width:100%; }
    .file-menu-button { display:block; width:100%; text-align:left; padding:12px; font-size:15px; margin:6px 0; border-radius:6px; border:1px solid #ddd; background:#fff; cursor:pointer; }
    .file-menu-button.missing { opacity:0.55; background:#fafafa; }
    .file-menu-button.active-menu { outline: 2px solid #5b9bd5; background: #eef6ff; }
  </style>
</head>
<body>
  <h1>Bukivedenie: Results Viewer</h1>
  <div id="left">
    <label for="rawSelect" style="font-weight:600;display:block;margin-bottom:6px;">Выберите текст для анализа</label>
    <select id="rawSelect" style="width:100%;padding:8px;margin-bottom:8px;"></select>

    <div style="margin-top:8px">
      <textarea id="rawEditor" placeholder="Raw text will appear here..." style="height:300px"></textarea>
    </div>

    <div style="margin-top:8px">
      <button id="runAnalysis">Сохранить и запустить анализ</button>
    </div>

    <div style="margin-top:12px">
      <strong>Текущий файл:</strong>
      <div id="currentFile" style="word-break:break-all;">(none)</div>
    </div>

    <!-- Файлное меню (быстрый доступ) под редактором -->
    <div id="fileButtonsContainer" style="margin-top:16px; border:1px solid #eee; padding:8px; background:#fff; max-height:520px; overflow:auto;">
      <strong style="display:block;margin-bottom:8px;">Файлы (быстрый доступ)</strong>
      <div id="fileMenuList" style="width:100%; max-height:520px; overflow:auto;"></div>
      <div style="margin-top:12px; display:flex; flex-direction:column; gap:8px;">
        <button id="iframeCloudBtn" style="width:100%; padding:10px; background:#dfd;" onclick="showCloudBtnClick('iframe')">Показать облако (iframe‑first)</button>
        <button id="demoCloudBtn" style="width:100%; padding:10px; background:#eef;" onclick="showCloudBtnClick('demo')">Показать демо‑облако (test_book)</button>
      </div>
    </div>
  </div>

  <div id="right">
    <h3>Результаты анализа</h3>
    <div id="preview" style="margin-bottom:12px;">
      <div id="meta" style="color:#444; margin-bottom:6px;"></div>
      <div id="content" style="border:1px solid #eee; padding:8px; background:#fafafa; min-height:60px;"></div>
    </div>

    <!-- Token by chapter widget -->
    <div id="tokenByChapterWidget" style="margin-bottom:12px;"></div>

    <!-- Error panel: appears when an error occurs, can show details -->
    <div id="errorPanel" style="display:none; border:1px solid #f2a; background:#fff0f2; padding:8px; margin-bottom:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong id="errorTitle">Ошибка</strong>
        <div>
          <button id="errorToggleDetails" style="margin-right:8px;">Показать детали</button>
          <button id="errorClose">Закрыть</button>
        </div>
      </div>
      <div id="errorMessage" style="margin-top:8px; color:#800;"></div>
      <pre id="errorDetails" style="display:none; white-space:pre-wrap; max-height:300px; overflow:auto; background:#fff; border:1px solid #fdd; padding:8px; margin-top:8px;"></pre>
    </div>
    <script>
      (function(){
        const toggle = document.getElementById('errorToggleDetails');
        const closeBtn = document.getElementById('errorClose');
        const details = document.getElementById('errorDetails');
        const panel = document.getElementById('errorPanel');
        toggle && toggle.addEventListener('click', ()=>{
          if (details.style.display === 'none' || details.style.display === '') { details.style.display = 'block'; toggle.innerText = 'Скрыть детали'; }
          else { details.style.display = 'none'; toggle.innerText = 'Показать детали'; }
        });
        closeBtn && closeBtn.addEventListener('click', ()=>{ if (panel) panel.style.display = 'none'; });
      })();
    </script>

    <div id="filesContainer">
      <div id="fileApp" style="display:flex; gap:12px; align-items:flex-start;">
        <div id="tabArea" style="flex:1; border:1px solid #ddd; padding:8px;">
          <div id="tabHeaders" style="margin-bottom:8px;"></div>
          <div id="tabContent" style="min-height:200px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Global palette for word clouds (shared across module and fallback scripts) -->
  <script>window.WORDCLOUD_PALETTE = ['#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd','#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf'];</script>
  <!-- d3 + d3-cloud for client-side wordcloud layout -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/d3-cloud/build/d3.layout.cloud.js"></script>
  <script type="module" src="/static/app.js"></script>
  <script src="/static/fallback.js"></script>
  <script>
    // backward-compatible click handler for buttons (works with module or fallback)
    async function showCloudBtnClick(mode){
      try{
        console.log('showCloudBtnClick invoked, mode=', mode);
        // determine book
        let book = (document.getElementById('currentFile').innerText || '').replace(/\.txt$/i,'') || '';
        // immediate UI feedback
        try{ const content = document.getElementById('content'); if (content) content.innerText = 'Открытие облака...'; } catch(e){}
        if (!book) {
          const sel = document.getElementById('rawSelect'); if (sel && sel.value) book = sel.value.replace(/\.txt$/i,'');
        }
        if (!book) {
          try { const rf = await (await fetch('/api/raw_files')).json(); const files = (rf && rf.files) || []; if (files.length) { book = files[0].replace(/\.txt$/i,''); try { const sel=document.getElementById('rawSelect'); if (sel) { sel.value = files[0]; sel.dispatchEvent(new Event('change')); } } catch(e){} } } catch(e){}
        }
        if (!book) { alert('Книга не выбрана'); return; }

        // Prefer server-side cloud_html preview: open it in an iframe for robust display
        try {
          const headersEl = document.getElementById('tabHeaders'); const contentEl = document.getElementById('tabContent');
          const id = ('file_' + book + '_cloud_preview').replace(/[^a-zA-Z0-9_\-]/g,'_');
          let panel = document.getElementById('panel_' + id);
          if (!panel) {
            const btn = document.createElement('button'); btn.id = 'tab_' + id; btn.textContent = 'Cloud'; btn.style.marginRight='8px'; btn.onclick = ()=>{ Array.from(headersEl.children).forEach(h=>h.classList.remove('active')); btn.classList.add('active'); Array.from(contentEl.children).forEach(c=>c.style.display='none'); document.getElementById('panel_' + id).style.display='block'; };
            headersEl.appendChild(btn);
            panel = document.createElement('div'); panel.id = 'panel_' + id; panel.style.display='block'; panel.style.padding='8px'; contentEl.appendChild(panel);
          }
          Array.from(headersEl.children).forEach(h=>h.classList.remove('active'));
          const tabBtn = document.getElementById('tab_' + id); if (tabBtn) tabBtn.classList.add('active');
          Array.from(contentEl.children).forEach(c=>c.style.display='none'); panel.style.display = 'block';
          panel.innerHTML = '';
          const toolbar = document.createElement('div'); toolbar.style.display='flex'; toolbar.style.justifyContent='space-between'; toolbar.style.marginBottom='8px';
          const title = document.createElement('div'); title.textContent = 'Cloud: ' + book; title.style.fontWeight='600';
          const actions = document.createElement('div'); const dl = document.createElement('button'); dl.textContent='Скачать tokens.csv'; dl.onclick = ()=>{ window.location = '/api/file_download?book=' + encodeURIComponent(book) + '&name=' + encodeURIComponent('tokens.csv'); };
          actions.appendChild(dl); toolbar.appendChild(title); toolbar.appendChild(actions); panel.appendChild(toolbar);
          // Open the server-rendered cloud_html in an iframe. If it is not available, open the local cloud page (client-side) as fallback.
          const iframe = document.createElement('iframe');
          iframe.style.width = '100%'; iframe.style.height = '520px'; iframe.style.border = 'none';
          // try server endpoint first
          iframe.src = '/api/cloud_html?book=' + encodeURIComponent(book);
          iframe.onerror = function(){
            try{ iframe.src = '/static/cloud_page.html?book=' + encodeURIComponent(book); }catch(e){ /* ignore */ }
          };
          // if server returns 404 or similar, fallback to local page after a short timeout
          setTimeout(()=>{ if (!iframe.contentWindow || iframe.contentDocument && iframe.contentDocument.body && iframe.contentDocument.body.childElementCount===0) { try{ iframe.src = '/static/cloud_page.html?book=' + encodeURIComponent(book); }catch(e){} } }, 1200);
          panel.appendChild(iframe);
          return;
        } catch(e) {
          console.error('cloud_html iframe failed', e);
        }

        // Fallback to client-side rendering if cloud_html iframe failed
        const resp = await fetch('/api/file_parsed?book=' + encodeURIComponent(book) + '&name=' + encodeURIComponent('tokens.csv'));
        const parsed = await resp.json();
        if (!parsed || parsed.error) { alert('Не удалось загрузить tokens.csv: ' + (parsed && parsed.error)); return; }
        if (parsed.type !== 'csv') { alert('tokens.csv имеет неверный формат: ' + parsed.type); return; }
        const headers = parsed.headers || [];
        const rows = parsed.rows || [];
        if (!rows.length) { alert('tokens.csv пустой'); return; }
        // create or select cloud tab
        const headersEl = document.getElementById('tabHeaders'); const contentEl = document.getElementById('tabContent');
        const id = ('file_' + book + '_cloud_preview').replace(/[^a-zA-Z0-9_\-]/g,'_');
        let panel = document.getElementById('panel_' + id);
        if (!panel) {
          const btn = document.createElement('button'); btn.id = 'tab_' + id; btn.textContent = 'Cloud'; btn.style.marginRight='8px'; btn.onclick = ()=>{ Array.from(headersEl.children).forEach(h=>h.classList.remove('active')); btn.classList.add('active'); Array.from(contentEl.children).forEach(c=>c.style.display='none'); document.getElementById('panel_' + id).style.display='block'; };
          headersEl.appendChild(btn);
          panel = document.createElement('div'); panel.id = 'panel_' + id; panel.style.display='block'; panel.style.padding='8px'; contentEl.appendChild(panel);
        }
        Array.from(headersEl.children).forEach(h=>h.classList.remove('active'));
        const tabBtn = document.getElementById('tab_' + id); if (tabBtn) tabBtn.classList.add('active');
        Array.from(contentEl.children).forEach(c=>c.style.display='none'); panel.style.display = 'block';
        panel.innerHTML = '';
        const toolbar = document.createElement('div'); toolbar.style.display='flex'; toolbar.style.justifyContent='space-between'; toolbar.style.marginBottom='8px';
        const title = document.createElement('div'); title.textContent = 'Cloud: ' + book; title.style.fontWeight='600';
        const actions = document.createElement('div'); const dl = document.createElement('button'); dl.textContent='Скачать tokens.csv'; dl.onclick = ()=>{ window.location = '/api/file_download?book=' + encodeURIComponent(book) + '&name=' + encodeURIComponent('tokens.csv'); };
        actions.appendChild(dl); toolbar.appendChild(title); toolbar.appendChild(actions); panel.appendChild(toolbar);
        const loadingEl = document.createElement('div'); loadingEl.textContent = 'Загрузка tokens.csv и генерация облака...'; panel.appendChild(loadingEl);

        // build cloud
        const tokenIdx = headers.indexOf('token') !== -1 ? headers.indexOf('token') : (headers.indexOf('word') !== -1 ? headers.indexOf('word') : -1);
        const countIdx = headers.indexOf('count') !== -1 ? headers.indexOf('count') : (headers.indexOf('frequency') !== -1 ? headers.indexOf('frequency') : -1);
        if (tokenIdx === -1) { panel.appendChild(document.createTextNode('tokens.csv не содержит столбца token')); return; }
        const items = rows.map(r=>{ const tok = r[tokenIdx]; let c=1; if (countIdx !== -1) { const n = Number(r[countIdx]); if (!isNaN(n)) c=n; } return {token: tok, count: c}; }).filter(x=>x.token);
        items.sort((a,b)=>b.count - a.count);
        const top = items.slice(0,200);
        const maxC = Math.max(...top.map(x=>x.count)); const minC = Math.min(...top.map(x=>x.count));
        const cloudBox = document.createElement('div'); cloudBox.style.border='1px solid #ddd'; cloudBox.style.padding='12px'; cloudBox.style.minHeight='180px'; cloudBox.style.background='#fff';
        const _palette = window.WORDCLOUD_PALETTE || ['#1f77b4','#ff7f0e','#2ca02c','#d62728','#9467bd','#8c564b','#e377c2','#7f7f7f','#bcbd22','#17becf'];
        for (const it of top){ const span=document.createElement('span'); const size = minC===maxC?20:Math.round(12 + (it.count - minC)/(maxC-minC)*56); span.style.fontSize = size+'px'; span.style.margin='6px'; span.style.display='inline-block'; span.style.cursor='pointer'; span.style.color = _palette[Math.floor(Math.random()*_palette.length)]; span.textContent = it.token; span.title = it.token + ' — ' + it.count; span.onclick = async ()=>{ try{ const r = await (await fetch('/api/token_by_chapter?book='+encodeURIComponent(book)+'&token='+encodeURIComponent(it.token))).json(); if (r && !r.error){ alert(JSON.stringify(r.counts)); } else { alert('Error: ' + (r && r.error)); } }catch(e){ alert('Error fetching token_by_chapter: '+e); } }; cloudBox.appendChild(span); }
        panel.appendChild(cloudBox);
      } catch(e){ console.error('showCloudBtnClick failed', e); alert('Ошибка: '+e); }
    }
    window.showCloudBtnClick = showCloudBtnClick;
  </script>

  <!-- Eruda mobile console loader: enable with ?eruda=1 or press the Console button -->
  <script>
    (function(){
      function loadEruda(){
        if(window.eruda) return;
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.crossOrigin = 'anonymous';
        s.onload = function(){
          try{ eruda.init({useShadowDom:true}); }catch(e){ console.warn('eruda init failed', e); }
        };
        document.body.appendChild(s);
      }

      var enabledByQuery = window.location.search.indexOf('eruda=1') !== -1;
      var enabledByStorage = (function(){ try{ return localStorage.getItem('enableEruda') === '1'; }catch(e){return false;} })();
      if (enabledByQuery || enabledByStorage) loadEruda();

      // Small floating button to enable console (visible on mobile/dev only)
      var btn = document.createElement('button');
      btn.id = 'erudaEnableBtn';
      btn.textContent = 'Console';
      btn.title = 'Enable debugging console (eruda)';
      btn.style.position = 'fixed';
      btn.style.right = '8px';
      btn.style.bottom = '8px';
      btn.style.zIndex = 99999;
      btn.style.padding = '8px 10px';
      btn.style.background = '#222';
      btn.style.color = '#fff';
      btn.style.border = 'none';
      btn.style.borderRadius = '6px';
      btn.style.opacity = 0.85;
      btn.style.fontSize = '13px';
      btn.style.boxShadow = '0 2px 6px rgba(0,0,0,0.3)';
      btn.onclick = function(e){
        e.preventDefault();
        try{ localStorage.setItem('enableEruda','1'); }catch(err){}
        loadEruda();
        btn.style.display = 'none';
      };
      // show button only on mobile or when localhost
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      var isLocal = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
      if (isMobile || isLocal) document.body.appendChild(btn);
    })();
  </script>
</body>
</html>
