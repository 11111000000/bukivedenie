name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (site)
        run: npm ci
        working-directory: site

      - name: Build site (Vite)
        # set base to /<repo>/ so the site works as a project page; if you host
        # as a user/org page (username.github.io) remove the `--base` argument.
        run: |
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          npm run build --if-present -- --base "/$REPO_NAME/"
        working-directory: site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/dist
          publish_branch: gh-pages
          allow_empty_commit: true
