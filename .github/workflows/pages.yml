name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Ensure the workflow has write access to repository contents for publishing
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f docs/requirements.txt ]; then pip install -r docs/requirements.txt; fi

      - name: Build pages data
        run: |
          # Prefer full regeneration when available; fallback to building site data only
          if [ -f scripts/regenerate_all.py ]; then
            python scripts/regenerate_all.py
          elif [ -f scripts/build_site_data.py ]; then
            python scripts/build_site_data.py --source outputs --target site/public/data
          else
            echo "No data build script found; continuing without regenerating outputs"
          fi

      - name: Install site dependencies
        working-directory: ./site
        run: npm ci --engine-strict=false

      - name: Build site
        working-directory: ./site
        run: npm run build

      - name: Deploy to gh-pages branch (fork)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site/dist
          publish_branch: gh-pages
