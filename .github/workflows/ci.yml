name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f docs/requirements.txt ]; then pip install -r docs/requirements.txt; fi
      - name: Run pytest
        run: |
          pip install pytest
          pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    needs: python-tests
    strategy:
      matrix:
        node-version: [18]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Build static data manifest
        run: python scripts/build_site_data.py --source outputs --target site/public/data
      - name: Install site deps
        working-directory: site
        run: |
          npm ci
      - name: Build site
        working-directory: site
        run: |
          npm run build
      - name: Smoke site bundle
        run: |
          test -f site/dist/index.html
          test -f site/dist/assets/index.js || true
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
