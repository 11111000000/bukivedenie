name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f docs/requirements.txt ]; then pip install -r docs/requirements.txt; fi
      - name: Run pytest
        run: |
          pip install pytest
          pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    needs: python-tests
    strategy:
      matrix:
        node-version: [18]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci
      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build
      - name: Deploy frontend bundle to runtime
        working-directory: frontend
        run: |
          npm run deploy
      - name: Smoke frontend bundle
        run: |
          test -f frontend/dist/main.js
          grep -q '/api/books' frontend/dist/main.js
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
