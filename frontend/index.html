<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literary Analytics</title>
    <script>
      // Some bundled browser libraries still read process.env.NODE_ENV.
      window.process ||= { env: { NODE_ENV: 'production' } }
    </script>
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; min-height: 100%; background: #f7f7f8; color: #1f2937; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { padding: 0 0 40px; }
      a { color: inherit; }
      button { font: inherit; }
      .container { width: min(1100px, calc(100vw - 32px)); margin: 0 auto; }
      header.container { padding: 12px 0 4px; }
      main.container { padding: 0 0 24px; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- bundle produced by Rollup -->
    <script type="module" src="/dist/main.js"></script>
  </body>
</html>
