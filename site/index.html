<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Лингвистический атлас книг — shell</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <!-- Minimal app styles (uses existing site/src/style.css) -->
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      /* Small overrides for the shell layout */
      html,body{min-height:100%;height:auto;margin:0;overflow-x:hidden}
      body{display:flex;flex-direction:column;min-height:100vh}
      header.shell-header{display:grid;gap:12px;padding:clamp(10px,1.8vw,18px);background:var(--panel,#fff);border:1px solid var(--line,#e6eef8);border-radius:16px;box-shadow:0 1px 0 rgba(14,23,38,.03)}
      .shell-title{font-size:clamp(1.1rem,2.6vw,2rem);font-weight:800;margin:0;line-height:1.12}
      .shell-lead{margin:4px 0 0;color:var(--muted,#6a7285);max-width:78ch;line-height:1.45}
      .shell-menu-row{display:flex;align-items:center;gap:12px;justify-content:space-between}
      .shell-menu-toggle{display:none;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:10px 14px;border-radius:12px;border:1px solid var(--line,#d7deea);background:#fff;color:var(--accent,#3558a6);font:inherit;font-weight:700;cursor:pointer}
      .shell-menu-toggle-icon{font-size:1.1rem;line-height:1}
      nav.shell-menu{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
      nav.shell-menu a{padding:10px 12px;border-radius:12px;border:1px solid var(--line,#d7deea);background:#fff;color:var(--accent,#3558a6);text-decoration:none;text-align:center;white-space:normal;line-height:1.2;min-height:44px;display:flex;align-items:center;justify-content:center}
      nav.shell-menu a.active{background:var(--accent,#3558a6);color:#fff;border-color:var(--accent,#3558a6)}
      iframe.content-frame{border:0;width:100%;flex:1;min-height:300px;background:transparent;overflow:hidden}
      @media (max-width:640px){
        body{min-height:-webkit-fill-available}
        header.shell-header{gap:10px;padding:10px}
        .shell-title{font-size:clamp(1.05rem,6vw,1.4rem)}
        .shell-lead{font-size:0.92rem;line-height:1.42}
        .shell-menu-row{display:flex}
        .shell-menu-toggle{display:inline-flex;width:100%;background:linear-gradient(180deg,#fff,#f7f9ff)}
        nav.shell-menu{display:none;grid-template-columns:1fr;gap:8px}
        nav.shell-menu a{justify-content:flex-start;text-align:left;padding:12px 14px}
        header.shell-header.open nav.shell-menu{display:grid}
        iframe.content-frame{min-height:250px;flex:1}
      }
    </style>
  </head>
  <body>
    <header class="shell-header">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="/favicon.svg" alt="logo" width="36" height="36" style="display:block" />
        <div>
          <h1 class="shell-title">Лингвистический атлас</h1>
          <p class="shell-lead">Интерактивная статическая витрина: тексты, метрики, графы и презентации собраны в одном месте, чтобы всё было видно без сервера и лишних переходов.</p>
        </div>
      </div>
      <div class="shell-menu-row">
        <button class="shell-menu-toggle" type="button" aria-expanded="false" aria-controls="shell-menu">
          <span class="shell-menu-toggle-icon">☰</span>
          <span>Меню</span>
        </button>
      </div>
      <nav id="shell-menu" class="shell-menu" role="navigation" aria-label="Main menu">
        <a href="#" data-src="lingvistics.html" class="active">Лингвистика</a>
        <a href="#" data-src="preza.html?v=20260514">Презентация</a>
        <a href="#" data-src="war-and-peace-map.html">Карта</a>
        <a href="#" data-src="war-and-peace-movements.html">Перемещения</a>
        <a href="#" data-src="war-and-peace-cloud.html">Облако</a>
        <a href="#" data-src="war-and-peace-characters.html">Персонажи</a>
        <a href="#" data-src="war-characters.html">Персонажи (связи)</a>
        <a href="#" data-src="war-and-peace-timeline.html">Таймлайн</a>
      </nav>
    </header>

    <iframe id="content-frame" class="content-frame" src="lingvistics.html" title="content"></iframe>

    <script>
      // Menu click handler: update iframe src
      const header = document.querySelector('header.shell-header');
      const toggle = document.querySelector('.shell-menu-toggle');
      const menu = document.querySelectorAll('nav.shell-menu a');
      const frame = document.getElementById('content-frame');
      if (toggle && header) {
        toggle.addEventListener('click', () => {
          const open = header.classList.toggle('open');
          toggle.setAttribute('aria-expanded', String(open));
        });
      }
      menu.forEach(a=>{
        a.addEventListener('click', e=>{
          e.preventDefault();
          const src = a.getAttribute('data-src');
          if(!src) return;
          // mark active
          menu.forEach(x=>x.classList.remove('active'));
          a.classList.add('active');
          frame.src = src;
          if (header && toggle && window.matchMedia('(max-width: 640px)').matches) {
            header.classList.remove('open');
            toggle.setAttribute('aria-expanded', 'false');
          }
        })
      });
    </script>
  </body>
</html>
